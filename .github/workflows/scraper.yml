name: Scraper Alternance Data Engineer

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python job_scraper.py
        env:
          FRANCE_TRAVAIL_ID: ${{ secrets.FRANCE_TRAVAIL_ID }}
          FRANCE_TRAVAIL_SECRET: ${{ secrets.FRANCE_TRAVAIL_SECRET }}
      - run: |
          git config --local user.email "bot@github-actions.com"
          git config --local user.name "Scraper Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Mise a jour offres"
          git push || true
